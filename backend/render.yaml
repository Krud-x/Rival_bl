services:
  - type: web
    name: rival-blog-backend
    runtime: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: PORT
        value: "3001"
      - key: NODE_ENV
        value: production
